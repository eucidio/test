<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Montessori Kleve - Medienkompetenz</title>
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
  <style>
    :root { --blue: #3498db; --red: #FF5757; --green: #2ecc71; --purple: #CB6CE6; --yellow: #FFDE59; }
    body { font-family: 'Comic Sans MS', sans-serif; background: #A3D8F4; margin: 0; padding: 10px; touch-action: manipulation; }
    #header { background: white; padding: 10px; display: flex; justify-content: space-between; align-items: center; border-bottom: 4px solid var(--blue); border-radius: 15px; margin-bottom: 10px; }
    .container { width: 95vw; max-width: 1000px; margin: 0 auto; background: white; padding: 20px; border-radius: 40px; border: 6px solid var(--blue); box-shadow: 8px 8px 0 var(--purple); position: relative; min-height: 650px; text-align: center; }
    .avatar-top { width: 80px; position: absolute; top: 10px; left: 10px; z-index: 10; }
    .btn-game { background: var(--red); color: white; border: none; padding: 15px 25px; font-size: 1.2rem; border-radius: 30px; cursor: pointer; margin: 5px; font-weight: bold; box-shadow: 0px 4px 0px #A70000; }
    .btn-game:active { transform: translateY(2px); box-shadow: 0px 1px 0px #A70000; }
    .hidden { display: none !important; }
    input[type="text"], input[type="number"] { padding: 12px; border-radius: 10px; border: 2px solid var(--blue); font-size: 18px; text-align: center; }
    .sort-item, .click-item { background: white; border: 2px solid var(--blue); padding: 12px; margin: 8px auto; border-radius: 12px; font-weight: bold; width: 85%; cursor: pointer; }
    .bluebot-grid { display: grid; grid-template-columns: repeat(5, 95px); grid-template-rows: repeat(5, 95px); gap: 3px; background: #bbb; margin: 10px auto; width: 487px; position: relative; border: 4px solid #333; }
    .grid-cell { background: white; width: 95px; height: 95px; border: 0.5px solid #eee; }
    #robot { position: absolute; width: 85px; height: 85px; transition: all 0.5s ease; z-index: 10; font-size: 65px; display: flex; align-items: center; justify-content: center; left: 5px; top: 385px; }
    .cmd-stack { background: #f9f9f9; border: 2px dashed var(--blue); padding: 10px; min-height: 55px; margin: 10px 0; border-radius: 10px; display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; font-size: 32px; }
    #paint-canvas { border: 3px solid var(--blue); background: white; touch-action: none; border-radius: 15px; display: block; margin: 0 auto; max-width: 100%; cursor: crosshair; }
    .palette { display: flex; justify-content: center; gap: 8px; margin: 10px; flex-wrap: wrap; }
    .swatch { width: 35px; height: 35px; border-radius: 50%; border: 2px solid #333; cursor: pointer; }
    .brush-btn { background: white; border: 2px solid var(--blue); padding: 5px 15px; border-radius: 10px; cursor: pointer; font-weight: bold; }
    .brush-btn.active { background: var(--blue); color: white; }
    #pixel-canvas { display: grid; grid-template-columns: repeat(15, 45px); margin: 10px auto; width: 675px; border: 2px solid #333; touch-action: none; background: #fff; }
    .pix { width: 45px; height: 45px; border: 0.5px solid #eee; display: flex; align-items: center; justify-content: center; font-size: 10px; color: #ccc; }
    .instruction-box { background: #fdfdfd; border: 3px dashed var(--blue); padding: 30px; border-radius: 20px; margin: 20px auto; max-width: 80%; }
  </style>
</head>
<body>

<div id="header">
  <div><strong>Montessori Kleve</strong></div>
  <div style="text-align:center; font-size: 16px;">Aufgabe <span id="task-num">1</span>/8 | <span id="score-label">0</span> Pkt.</div>
  <div id="timer">40:00</div>
</div>

<div class="container">
  <img src="" id="avatar-img" class="avatar-top hidden">
  <div id="game-area">
    <div id="screen-intro">
      <video id="vid" width="280" playsinline></video><br>
      <button class="btn-game" onclick="playOnce()">▶️ Play</button>
      <h2>Willkommen!</h2>
      <p>Gib deinen Code ein:</p>
      <input type="text" id="student-code" placeholder="Code...">
      <br><br>
      <button class="btn-game" style="background:var(--green); width: 250px;" onclick="initGame()">SPIEL STARTEN</button>
    </div>
    <div id="screen-tasks" class="hidden">
      <div id="task-content"></div>
    </div>
  </div>
</div>

<script>
  const BASE_URL = "https://eucidio.github.io/test/"; 
  const scriptURL = "https://script.google.com/macros/s/AKfycbzbds4zjk6QHPEjkyjVJ_zmXBF1MRgcJOjlX45SfIZlTnvTiw3iSYxGeGUZU6mCd0OIRA/exec"; 

  let studentID = "", punkte = 0, tempo = 40 * 60, currentTask = 1, versuche = 0, subIndex = 0;
  let botX = 0, botY = 4, botCmds = [];
  let pixelsPainted = 0, currentColor = "#000000", currentBrushSize = 8;
  let savedAntwortA5 = "", drawingData = ""; 
  let isShowingInstruction = true;

  // VARIÁVEIS DE PROTOCOLO (Respostas certas ou não)
  let a1Hits = 0, a2Status = "Nein", a3Status = "Nein", a7Hits = 0, a8Hits = 0;

  window.onload = function() {
    const urlParams = new URLSearchParams(window.location.search);
    const idDoQR = urlParams.get('id');
    if (idDoQR) { document.getElementById('student-code').value = idDoQR.toUpperCase(); }
  };

  const a1Data = [
    { n: 'Bluetooth', i: BASE_URL+'bluetooth.png', s: BASE_URL+'bluetooth.mp3', o: ['Bluetoot', 'Bluetooh', 'Bluetooth'] },
    { n: 'Airdrop', i: BASE_URL+'airdrop.png', s: BASE_URL+'airdrop.mp3', o: ['Aidrop', 'Airdrop', 'Airdropo'] },
    { n: 'Browser', i: BASE_URL+'browser.png', s: BASE_URL+'browser.mp3', o: ['Browser', 'Browsher', 'Brouser'] },
    { n: 'Suchmaschine', i: BASE_URL+'suchemaschine.png', s: BASE_URL+'suchmachine.mp3', o: ['Suchmachine', 'Suchmaschine', 'Suchmaschin'] }
  ];

  function playOnce() { 
    let v = document.getElementById('vid'); v.src = BASE_URL + "menina_video.mp4"; v.play(); 
  }

  function initGame() {
    studentID = document.getElementById('student-code').value;
    if(!studentID) return alert("Code!");
    document.getElementById('screen-intro').classList.add('hidden');
    let av = document.getElementById('avatar-img'); av.src = BASE_URL + "menina.png"; av.classList.remove('hidden');
    document.getElementById('screen-tasks').classList.remove('hidden');
    renderCurrentTask();
    setInterval(() => { if(tempo>0){ tempo--; updateTimer(); } }, 1000);
  }

  function updateTimer() { 
    let m = Math.floor(tempo/60), s = tempo%60; document.getElementById('timer').innerText = `${m}:${s < 10 ? '0' : ''}${s}`; 
  }

  function renderCurrentTask() {
    document.getElementById('task-num').innerText = currentTask;
    const area = document.getElementById('task-content');
    area.innerHTML = ""; 

    if (isShowingInstruction && currentTask < 8) {
        showInstructionScreen(area);
        return;
    }

    if(currentTask === 1) {
      if(subIndex >= a1Data.length) { nextTask(2); return; }
      let it = a1Data[subIndex];
      area.innerHTML = `<h3>AUFGABE 1</h3><img src="${it.i}" height="180"><br><button class="btn-game" onclick="new Audio('${it.s}').play()">🔈 HÖREN</button><div id="opts"></div>`;
      it.o.forEach(opt => {
        const btn = document.createElement('button'); btn.className = "btn-game"; btn.innerText = opt;
        btn.onclick = () => { 
          if(opt === it.n){ punkte+=10; a1Hits++; subIndex++; versuche=0; renderCurrentTask(); } 
          else { versuche++; if(versuche >= 2) { subIndex++; versuche=0; renderCurrentTask(); } else alert("Falsch!"); }
        };
        document.getElementById('opts').appendChild(btn);
      });
    } else if(currentTask === 2) {
      const a2D = ["Essen aufräumen","Den Tisch abwischen","Hände waschen","Hände abtrocknen","iPad-Akku prüfen","iPad auf den Tisch legen"];
      area.innerHTML = `<h3>AUFGABE 2</h3><div id="sort-list">${a2D.map((t, i) => `<div class="sort-item" data-id="${i+1}">${t}</div>`).sort(()=>Math.random()-0.5).join('')}</div><button class="btn-game" onclick="checkA2()">PRÜFEN</button>`;
      new Sortable(document.getElementById('sort-list'), { animation: 150 });
    } else if(currentTask === 3) {
      botCmds = []; botX = 0; botY = 4;
      const trees = [{x:1, y:2}, {x:3, y:1}]; 
      area.innerHTML = `<h3>AUFGABE 3</h3><div class="bluebot-grid"><div style="position:absolute;top:15px;right:15px;font-size:50px;z-index:1;">🏫</div>${trees.map(t => `<div style="position:absolute; left:${t.x*95+25}px; top:${t.y*95+20}px; font-size:40px; z-index:1;">🌳</div>`).join('')}<div id="robot">🤖</div>${Array(25).fill('<div class="grid-cell"></div>').join('')}</div>
        <div class="cmd-stack" id="stack"> </div>
        <div><button class="btn-game" onclick="addBotCmd('F')">⬆️</button><button class="btn-game" onclick="addBotCmd('B')">⬇️</button><button class="btn-game" onclick="addBotCmd('L')">↩️</button><button class="btn-game" onclick="addBotCmd('R')">↪️</button></div>
        <button class="btn-game" style="background:var(--blue)" onclick="renderCurrentTask()">RESET 🔄</button><button id="btnA3" class="btn-game" style="background:var(--green)" onclick="runBotLogic()">GO!</button>`;
    } else if(currentTask === 4) {
      area.innerHTML = `<h3>AUFGABE 4</h3><input type="text" id="t-name" placeholder="Name..."><button class="btn-game" onclick="translateNow()">Verwandeln!</button>
        <div id="b-res" class="hidden" style="background:#eee;padding:15px;margin:10px;word-break:break-all;font-family:monospace;border:2px dashed var(--blue);"></div>
        <div id="count-area" class="hidden"><br>0: <input type="number" id="z" style="width:60px"> 1: <input type="number" id="o" style="width:60px"><br><button class="btn-game" onclick="punkte+=20; nextTask(5);">PRÜFEN</button></div>`;
    } else if(currentTask === 5) {
      area.innerHTML = `<h3>AUFGABE 5</h3><div id="pixel-canvas"></div><br><input type="text" id="px-guess" placeholder="Was?"><button class="btn-game" onclick="checkA5()">WEITER</button>`;
      loadPixels();
    } else if(currentTask === 6) {
      area.innerHTML = `<h3>AUFGABE 6</h3><div class="palette">${['#000','#7F7F7F','#880015','#F00','#FF7F27','#FF0','#0F0','#00A2E8','#00F','#A349A4','#FFAEC9','#FFF'].map(c=>`<div class="swatch" style="background:${c}" onclick="currentColor='${c}'"></div>`).join('')}</div>
        <div class="palette"><button class="brush-btn" onclick="currentBrushSize=3">Fein</button><button class="brush-btn active" onclick="currentBrushSize=8">Mittel</button><button class="brush-btn" onclick="currentBrushSize=15">Groß</button><button class="brush-btn" onclick="currentColor='#FFFFFF'">🧽</button></div>
        <canvas id="paint-canvas" width="600" height="400"></canvas><br><button class="btn-game" onclick="saveDrawingAndNext()">FERTIG</button>`;
      initPaint();
    } else if(currentTask === 7) {
      const qA = [
        {q: "Jemand fragt dich im Internet: 'Wie alt bist du?'. Was machst du?", i: BASE_URL + "jahr.png", o: ["Ich sage mein Alter.", "Ich rufe meine Eltern und zeige es ihnen."], c: 1},
        {q: "Jemand fragt nach deiner Adresse. Was machst du?", i: BASE_URL + "adresse.png", o: ["Ich schicke sie sofort.", "Ich frage, warum er das wissen möchte..", "Ich rufe meine Eltern e zeige es ihnen."], c: 2},
        {q: "Du siehst Werbung in einer Spiele-App. Was machst du?", i: BASE_URL + "kaufen.png", o: ["Ich klicke drauf, um zu gucken.", "Ich bitte meine Eltern, die App zu löschen."], c: 1},
        {q: "Jemand möchte, dass du Fotos or Videos schickst. Was machst du?", i: BASE_URL + "fotos.png", o: ["Ich schicke die Fotos.", "Ich rufe meine Eltern e zeige es ihnen."], c: 1}
      ];
      if(subIndex >= qA.length) { nextTask(8); return; }
      area.innerHTML = `<h3>AUFGABE 7</h3><img src="${qA[subIndex].i}" height="180"><p>${qA[subIndex].q}</p><div id="q-opts"></div>`;
      qA[subIndex].o.forEach((o, j) => {
        const btn = document.createElement('div'); btn.className = "sort-item"; btn.innerText = o;
        btn.onclick = () => { if(j === qA[subIndex].c) { punkte+=10; a7Hits++; } subIndex++; renderCurrentTask(); };
        document.getElementById('q-opts').appendChild(btn);
      });
    } else if(currentTask === 8) {
      area.innerHTML = `<h3>AUFGABE 8</h3><p>Was darfst du mit dem iPad <b>NICHT</b> machen? (Klicke an):</p>
        <div class="click-item" onclick="handleA8(this, true)">Beim iPad-Spielen essen</div>
        <div class="click-item" onclick="handleA8(this, true)">Laden erst bei unter 2% Akku</div>
        <div class="click-item" onclick="handleA8(this, true)">Das iPad mit nur einer Hand tragen.</div>
        <div class="click-item" onclick="handleA8(this, false)">Das iPad immer sicher auf den Tisch legen.</div>
        <div class="click-item" onclick="handleA8(this, true)">Das iPad auf den Boden legen</div>
        <div class="click-item" onclick="handleA8(this, true)">Das iPad aus der Schutzhülle nehmen</div>
        <br><button class="btn-game" onclick="finishGame()">ENDE</button>`;
    }
    document.getElementById('score-label').innerText = punkte;
  }

  function showInstructionScreen(area) {
    let msg = ""; let audio = "";
    if(currentTask === 1) { msg = "Sieh dir das Bild an und höre das Audio. Dann klicke auf die Antwort, die du richtig findest. Du hast zwei Versuche. Wenn du gleich beim ersten Mal richtig bist, gehen wir schon zum nächsten Bild."; audio = "aufgabe1.mp3"; }
    else if(currentTask === 2) msg = "Du hast gerade gefrühstückt und musst eine Aufgabe auf dem iPad machen. Was musst du jetzt tun?";
    else if(currentTask === 3) msg = "Klicke auf die Befehle, die du dem Bluebot geben musst, damit er zur Schule kommt. Es gibt mehrere richtige Antworten.";
    else if(currentTask === 4) msg = "Wie viele 0 und wie viele 1 hat dein Name (Vorname und Nachname)?";
    else if(currentTask === 5) msg = "Male die Punkte aus (Streiche einfach mit dem Finger über die Zahlen). Schreibe danach, welches Bild erschienen ist. Es gibt mehrere Möglichkeiten.";
    else if(currentTask === 6) msg = "Male die App oder das Gerät, das du am meisten magst oder benutzt.";
    else if(currentTask === 7) msg = "Antworte richtig:";
    area.innerHTML = `<div class="instruction-box"><h2>AUFGABE ${currentTask}</h2><p style="font-size:1.3rem;">${msg}</p><br><button class="btn-game" style="background:var(--green)" onclick="isShowingInstruction=false; renderCurrentTask();">WEITER</button></div>`;
    if(audio) new Audio(BASE_URL + audio).play();
  }

  function nextTask(num) { currentTask = num; subIndex = 0; isShowingInstruction = true; renderCurrentTask(); }

  function handleA8(el, isBadAction) {
    if(el.dataset.clicked) return;
    el.dataset.clicked = "true";
    if(isBadAction) { el.style.background = "#d4edda"; punkte += 5; a8Hits++; document.getElementById('score-label').innerText = punkte; } 
    else { el.style.background = "#f8d7da"; }
  }

  function checkA2() {
    const items = document.querySelectorAll('.sort-item'); let correct = 0;
    items.forEach((it, idx) => { if(parseInt(it.getAttribute('data-id')) === (idx+1)) { it.style.background="#d4edda"; correct++; } else it.style.background="#f8d7da"; });
    if(correct === items.length) { punkte+=20; a2Status = "Ja"; setTimeout(() => { nextTask(3); }, 1500); }
    else { versuche++; if(versuche >= 2) setTimeout(() => { nextTask(3); }, 1500); else alert("Falsch!"); }
  }

  function addBotCmd(type) { botCmds.push(type); document.getElementById('stack').innerHTML += (type==='F'?'⬆️':type==='B'?'⬇️':type==='L'?'↩️':'↪️') + " "; }
  
  function runBotLogic() {
    let i = 0, r = document.getElementById('robot'); let cX=0, cY=4, cD=0;
    const trees = [{x:1, y:2}, {x:3, y:1}];
    function step() {
      if(i < botCmds.length) {
        let cmd = botCmds[i];
        if(cmd === 'L') cD = (cD+3)%4; else if(cmd === 'R') cD = (cD+1)%4;
        else { let m = (cmd==='F'?-1:1); if(cD===0)cY+=m; else if(cD===1)cX-=m; else if(cD===2)cY-=m; else if(cD===3)cX+=m; }
        cX = Math.max(0, Math.min(4, cX)); cY = Math.max(0, Math.min(4, cY));
        if(trees.find(t => t.x === cX && t.y === cY)) { alert("Achtung! Baum! 🌳"); renderCurrentTask(); return; }
        r.style.transform = `rotate(${cD*90}deg)`; r.style.left = (cX*95+5)+"px"; r.style.top = (cY*95+5)+"px";
        i++; setTimeout(step, 600);
      } else { if(cX===4 && cY===0) { punkte+=20; a3Status = "Ja"; nextTask(4); } else { alert("Falsch!"); renderCurrentTask(); } }
    }
    step();
  }

  function translateNow() {
    let v = document.getElementById('t-name').value; if(!v) return;
    let binary = v.split('').map(c => c.charCodeAt(0).toString(2).padStart(8,'0')).join(' ');
    document.getElementById('b-res').innerText = binary; document.getElementById('b-res').classList.remove('hidden'); document.getElementById('count-area').classList.remove('hidden');
  }

  function loadPixels() {
    const c = document.getElementById('pixel-canvas'); c.innerHTML = "";
    for(let i=0; i<15*13; i++){
      let p = document.createElement('div'); p.className='pix'; p.dataset.p="f"; p.innerText=Math.floor(Math.random()*9)+1;
      const paint = (el) => {
        if(el && el.className==='pix' && el.dataset.p==="f"){
          el.dataset.p="t"; pixelsPainted++; el.style.backgroundImage=`url('${BASE_URL}fruhling.png')`; el.style.backgroundSize="675px 585px";
          let idx = Array.from(c.children).indexOf(el); el.style.backgroundPosition = `-${(idx%15)*45}px -${Math.floor(idx/15)*45}px`;
          el.innerText=""; el.style.border="none";
        }
      };
      p.onmouseover = () => paint(p); p.ontouchmove = (e) => { e.preventDefault(); paint(document.elementFromPoint(e.touches[0].clientX, e.touches[0].clientY)); };
      c.appendChild(p);
    }
  }

  function checkA5() { savedAntwortA5 = document.getElementById('px-guess').value; nextTask(6); }

  function initPaint() {
    const cvs = document.getElementById('paint-canvas'); const ctx = cvs.getContext('2d');
    ctx.fillStyle = "#FFFFFF"; ctx.fillRect(0,0,cvs.width,cvs.height);
    let d = false;
    const getXY = (e) => {
      const r = cvs.getBoundingClientRect();
      const x = (e.touches ? e.touches[0].clientX : e.clientX) - r.left;
      const y = (e.touches ? e.touches[0].clientY : e.clientY) - r.top;
      return [x, y];
    };
    cvs.onmousedown = cvs.ontouchstart = (e) => { d = true; ctx.beginPath(); const [x,y] = getXY(e); ctx.moveTo(x,y); };
    cvs.onmouseup = cvs.ontouchend = () => { d = false; };
    cvs.onmousemove = cvs.ontouchmove = (e) => { if(!d) return; e.preventDefault(); ctx.lineWidth = currentBrushSize; ctx.lineCap='round'; ctx.strokeStyle = currentColor; const [x,y] = getXY(e); ctx.lineTo(x,y); ctx.stroke(); };
  }

  function saveDrawingAndNext() {
    const cvs = document.getElementById('paint-canvas'); drawingData = cvs.toDataURL("image/png"); punkte += 10; nextTask(7);
  }

  function finishGame() {
    // CRIA O PROTOCOLO DE TEXTO
    let log = `A1:${a1Hits}/4 | A2:${a2Status} | A3:${a3Status} | A7:${a7Hits}/4 | A8:${a8Hits}/5`;
    
    document.getElementById('avatar-img').classList.add('hidden'); document.getElementById('header').classList.add('hidden');
    document.getElementById('game-area').innerHTML = `<img src="${BASE_URL}menino.png" width="300"><div style="font-size:70px; font-weight:bold; color:var(--purple); margin:20px 0;">Fertig!</div><p>Punkte: ${punkte}</p>`;
    
    fetch(scriptURL, { 
        method: "POST", 
        mode: "no-cors", 
        body: JSON.stringify({ 
            id: studentID, 
            score: punkte, 
            antwortA5: savedAntwortA5, 
            bildData: drawingData,
            a1_hits: a1Hits,
            details: log 
        }) 
    });
  }
</script>
</body>
</html>
