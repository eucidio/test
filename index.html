<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Montessori Kleve - Medienkompetenz</title>
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
  <style>
    :root { --blue: #3498db; --red: #FF5757; --green: #2ecc71; --purple: #CB6CE6; --yellow: #FFDE59; }
    body { font-family: 'Comic Sans MS', sans-serif; background: #A3D8F4; margin: 0; padding: 10px; touch-action: manipulation; }
    #header { background: white; padding: 10px; display: flex; justify-content: space-between; align-items: center; border-bottom: 4px solid var(--blue); border-radius: 15px; margin-bottom: 10px; }
    .container { width: 95vw; max-width: 1000px; margin: 0 auto; background: white; padding: 20px; border-radius: 40px; border: 6px solid var(--blue); box-shadow: 8px 8px 0 var(--purple); position: relative; min-height: 650px; text-align: center; }
    .avatar-top { width: 80px; position: absolute; top: 10px; left: 10px; z-index: 10; }
    .btn-game { background: var(--red); color: white; border: none; padding: 15px 25px; font-size: 1.2rem; border-radius: 30px; cursor: pointer; margin: 5px; font-weight: bold; box-shadow: 0px 4px 0px #A70000; }
    .btn-game:active { transform: translateY(2px); box-shadow: 0px 1px 0px #A70000; }
    .hidden { display: none; }
    input[type="text"], input[type="number"] { padding: 12px; border-radius: 10px; border: 2px solid var(--blue); font-size: 18px; text-align: center; }

    .sort-item, .click-item { background: white; border: 2px solid var(--blue); padding: 12px; margin: 8px auto; border-radius: 12px; font-weight: bold; width: 85%; cursor: pointer; }
    .correct-bg { background-color: #d4edda !important; border-color: #28a745 !important; }
    .error-bg { background-color: #f8d7da !important; border-color: #dc3545 !important; }
    
    .bluebot-grid { display: grid; grid-template-columns: repeat(5, 95px); grid-template-rows: repeat(5, 95px); gap: 3px; background: #bbb; margin: 10px auto; width: 487px; position: relative; border: 4px solid #333; }
    .grid-cell { background: white; width: 95px; height: 95px; border: 0.5px solid #eee; }
    #robot { position: absolute; width: 85px; height: 85px; transition: all 0.5s ease; z-index: 10; font-size: 65px; display: flex; align-items: center; justify-content: center; left: 5px; top: 385px; }
    .tree { position: absolute; font-size: 50px; z-index: 5; }
    .cmd-stack { background: #f9f9f9; border: 2px dashed var(--blue); padding: 10px; min-height: 55px; margin: 10px 0; border-radius: 10px; display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; font-size: 32px; }

    #paint-canvas { border: 3px solid var(--blue); background: white; touch-action: none; border-radius: 15px; display: block; margin: 0 auto; }
    .palette { display: flex; justify-content: center; gap: 8px; margin: 10px; flex-wrap: wrap; }
    .swatch { width: 35px; height: 35px; border-radius: 50%; border: 2px solid #333; cursor: pointer; }
    .brush-btn { background: white; border: 2px solid var(--blue); padding: 5px 15px; border-radius: 10px; cursor: pointer; font-weight: bold; }
    .brush-btn.active { background: var(--blue); color: white; }

    #pixel-canvas { display: grid; grid-template-columns: repeat(15, 45px); margin: 10px auto; width: 675px; border: 2px solid #333; touch-action: none; background: #fff; }
    .pix { width: 45px; height: 45px; border: 0.5px solid #eee; display: flex; align-items: center; justify-content: center; font-size: 10px; color: #ccc; }
    .finish-text { font-size: 80px; font-weight: bold; color: var(--purple); margin: 20px 0; }
  </style>
</head>
<body>

<div id="header">
  <div><strong>Montessori Kleve</strong></div>
  <div style="text-align:center; font-size: 16px;">Aufgabe <span id="task-num">1</span>/8 | <span id="score-label">0</span> Pkt.</div>
  <div id="timer">40:00</div>
</div>

<div class="container">
  <img src="menina.png" id="avatar" class="avatar-top hidden">
  <div id="game-area">
    <div id="screen-intro">
      <video id="vid" width="280" src="menina_video.mp4" playsinline></video><br>
      <button class="btn-game" onclick="playOnce()">▶️ Play</button>
      <h2>Willkommen!</h2>
      <p>Gib deinen Code ein:</p>
      <input type="text" id="student-code" placeholder="Code...">
      <br><br>
      <button class="btn-game" style="background:var(--green);" onclick="initGame()">SPIEL STARTEN</button>
    </div>
    <div id="screen-tasks" class="hidden">
      <div id="task-content"></div>
      <p id="feedback" style="font-weight:bold; color:var(--red); min-height:30px; margin-top:10px;"></p>
    </div>
  </div>
</div>

<script>
  let studentID = "", punkte = 0, tempo = 40 * 60, currentTask = 1, versuche = 0, subIndex = 0;
  let botX = 0, botY = 4, botDir = 0, botCmds = [];
  const trees = [{x: 2, y: 1}, {x: 1, y: 3}];
  let pixelsPainted = 0, currentColor = "#000000", currentBrushSize = 5;
  let savedAntwortA5 = "";

  const a1Data = [
    { n: 'Bluetooth', i: 'bluetooth.jpg', s: 'bluetooth.mp3', o: ['Bluetooth', 'Bluetooh', 'Bluetot'] },
    { n: 'Airdrop', i: 'airdrop.png', s: 'airdrop.mp3', o: ['Airdrop', 'Aidrop', 'Airdropo'] },
    { n: 'Browser', i: 'browser.png', s: 'browser.mp3', o: ['Browser', 'Browsher', 'Brouser'] },
    { n: 'Suchmaschine', i: 'suchmachine.jpg', s: 'suchmachine.mp3', o: ['Suchmaschine', 'Suchmaschina', 'Suchmaschin'] }
  ];

  function playOnce() { let v = document.getElementById('vid'); v.muted = false; v.play(); }

  function initGame() {
    studentID = document.getElementById('student-code').value;
    if(!studentID) return alert("Code!");
    document.getElementById('screen-intro').classList.add('hidden');
    document.getElementById('avatar').classList.remove('hidden');
    document.getElementById('screen-tasks').classList.remove('hidden');
    renderCurrentTask();
    setInterval(() => { if(tempo>0){ tempo--; updateTimer(); } }, 1000);
  }

  function updateTimer() { let m = Math.floor(tempo/60), s = tempo%60; document.getElementById('timer').innerText = `${m}:${s < 10 ? '0' : ''}${s}`; }

  function renderCurrentTask() {
    document.getElementById('task-num').innerText = currentTask;
    const area = document.getElementById('task-content');
    area.innerHTML = ""; 

    if(currentTask === 1) {
      if(subIndex >= a1Data.length) { currentTask = 2; versuche = 0; renderCurrentTask(); return; }
      let it = a1Data[subIndex];
      area.innerHTML = `<h3>Aufgabe 1</h3><img src="${it.i}" height="150"><br><button class="btn-game" onclick="new Audio('${it.s}').play()">🔈 HÖREN</button><div id="opts"></div>`;
      it.o.forEach(opt => {
        const btn = document.createElement('button'); btn.className = "btn-game"; btn.innerText = opt;
        btn.onclick = () => { if(opt === it.n){ punkte+=10; subIndex++; renderCurrentTask(); } else alert("Falsch!"); };
        document.getElementById('opts').appendChild(btn);
      });
    } else if(currentTask === 2) {
      const a2D = ["Essen aufräumen","Den Tisch abwischen","Hände waschen","Hände abtrocknen","iPad-Akku prüfen","iPad auf den Tisch legen"];
      area.innerHTML = `<h3>Aufgabe 2</h3><div id="sort-list">${a2D.map((t, i) => `<div class="sort-item" data-id="${i+1}">${t}</div>`).sort(()=>Math.random()-0.5).join('')}</div><button class="btn-game" onclick="checkA2()">PRÜFEN</button>`;
      new Sortable(document.getElementById('sort-list'), { animation: 150 });
    } else if(currentTask === 3) {
      botCmds = []; botX = 0; botY = 4; botDir = 0;
      area.innerHTML = `<h3>Aufgabe 3: Bluebot</h3><div class="bluebot-grid"><div style="position:absolute;top:10px;right:10px;font-size:50px;">🏫</div><div id="robot">🤖</div>${trees.map(t => `<div class="tree" style="left:${t.x*95+20}px; top:${t.y*95+15}px">🌲</div>`).join('')}${Array(25).fill('<div class="grid-cell"></div>').join('')}</div>
        <div class="cmd-stack" id="stack"> </div>
        <div><button class="btn-game" onclick="addBotCmd('F')">⬆️</button><button class="btn-game" onclick="addBotCmd('B')">⬇️</button><button class="btn-game" onclick="addBotCmd('L')">↩️</button><button class="btn-game" onclick="addBotCmd('R')">↪️</button></div>
        <button id="btnA3" class="btn-game" style="background:var(--green)" onclick="runBotLogic()">GO!</button> <button class="btn-game" onclick="renderCurrentTask()">Reset</button>`;
    } else if(currentTask === 4) {
      area.innerHTML = `<h3>Aufgabe 4: Binär</h3><input type="text" id="t-name" placeholder="Name..."><button class="btn-game" onclick="translateNow()">Verwandeln!</button>
        <div id="b-res" class="hidden" style="background:#eee;padding:15px;margin:10px;word-break:break-all;font-family:monospace;border:2px dashed var(--blue);"></div>
        <div id="count-area" class="hidden"><br>0: <input type="number" id="z" style="width:60px"> 1: <input type="number" id="o" style="width:60px"><br><button class="btn-game" onclick="checkA4()">PRÜFEN</button></div>`;
    } else if(currentTask === 5) {
      pixelsPainted = 0;
      area.innerHTML = `<h3>Aufgabe 5: Pixel Art</h3><div id="pixel-canvas"></div><br><input type="text" id="px-guess" placeholder="Was siehst du?"><button class="btn-game" onclick="checkA5()">WEITER</button>`;
      loadPixels();
    } else if(currentTask === 6) {
      area.innerHTML = `<h3>Aufgabe 6: Malen</h3><div class="palette">${['#000','#F00','#0F0','#00F','#FF0','#F0F','#0FF','#8B4513','#FFF'].map(c=>`<div class="swatch" style="background:${c}" onclick="currentColor='${c}'"></div>`).join('')}</div>
        <div class="palette"><button class="brush-btn" onclick="currentBrushSize=3">Fina</button><button class="brush-btn active" onclick="currentBrushSize=8">Media</button><button class="brush-btn" onclick="currentBrushSize=15">Grossa</button><button class="brush-btn" onclick="currentColor='#FFFFFF'">Borracha 🧽</button></div>
        <canvas id="paint-canvas" width="650" height="400"></canvas><br><button class="btn-game" onclick="finishA6()">FERTIG (10 Pkt)</button>`;
      initPaint();
    } else if(currentTask === 7) {
      const qA = [
        {q:"Du sprichst mit jemandem und er fragt nach deinem Alter. Was machst du?", i:"Jahr.jpg", o:["Sagen.", "Eltern rufen."], c:1},
        {q:"Alguém pede seu endereço, o que você faz?", i:"Adresse.jpg", o:["Senden.", "Warum?", "Eltern rufen."], c:2},
        {q:"Werbung in einer App. Was machst du?", i:"Kaufen.jpg", o:["Klicken.", "Eltern löschen lassen."], c:1},
        {q:"Jemand will Fotos/Videos. Was machst du?", i:"Fotos.jpg", o:["Senden.", "Eltern rufen."], c:1}
      ];
      if(subIndex >= qA.length) { currentTask=8; renderCurrentTask(); return; }
      area.innerHTML = `<h3>Aufgabe 7</h3><img src="${qA[subIndex].i}" height="150"><p>${qA[subIndex].q}</p><div id="q-opts"></div>`;
      qA[subIndex].o.forEach((o, j) => {
        const btn = document.createElement('div'); btn.className = "sort-item"; btn.innerText = o;
        btn.onclick = () => { if(j === qA[subIndex].c) punkte+=10; subIndex++; renderCurrentTask(); };
        document.getElementById('q-opts').appendChild(btn);
      });
    } else if(currentTask === 8) {
      area.innerHTML = `<h3>Aufgabe 8</h3><p>Was darf man mit dem iPad <b>NICHT</b> tun?</p>
        <div id="click-list">
          <div class="click-item" data-bad="true">Essen beim iPad-Gebrauch</div>
          <div class="click-item" data-bad="false">iPad am sicheren Ort lassen</div>
          <div class="click-item" data-bad="true">iPad auf den Boden legen</div>
          <div class="click-item" data-bad="true">iPad aus der Schutzhülle nehmen</div>
          <div class="click-item" data-bad="true">iPad mit einer Hand tragen</div>
          <div class="click-item" data-bad="true">Laden bei unter 2% Akku</div>
        </div>
        <button class="btn-game" style="background:var(--green)" onclick="checkA8()">FERTIG</button>`;
      document.querySelectorAll('.click-item').forEach(el => el.onclick = () => el.classList.toggle('error-bg'));
    }
    document.getElementById('score-label').innerText = punkte;
  }

  function checkA2() {
    const list = [...document.querySelectorAll('.sort-item')];
    const isCorrect = list.every((el, i) => el.dataset.id == (i+1));
    list.forEach((el, i) => el.className = el.dataset.id == (i+1) ? "sort-item correct-bg" : "sort-item error-bg");
    if(isCorrect) { punkte += 20; setTimeout(() => { currentTask = 3; versuche = 0; renderCurrentTask(); }, 1200); }
    else { versuche++; if(versuche >= 2) { setTimeout(() => { currentTask = 3; versuche = 0; renderCurrentTask(); }, 1200); } }
  }

  function addBotCmd(type) { botCmds.push(type); const icons = {F:'⬆️', B:'⬇️', L:'↩️', R:'↪️'}; document.getElementById('stack').innerHTML += icons[type] + " "; }
  
  function runBotLogic() {
    let i = 0, r = document.getElementById('robot');
    let currentTempDir = 0;
    document.getElementById('btnA3').disabled = true;

    function step() {
      if(i < botCmds.length) {
        let cmd = botCmds[i];
        if(cmd === 'L') currentTempDir = (currentTempDir + 3) % 4;
        else if(cmd === 'R') currentTempDir = (currentTempDir + 1) % 4;
        else {
          let m = (cmd === 'F') ? -1 : 1;
          if(currentTempDir === 0) botY += m; else if(currentTempDir === 1) botX -= m; else if(currentTempDir === 2) botY -= m; else if(currentTempDir === 3) botX += m;
          botX = Math.max(0, Math.min(4, botX)); botY = Math.max(0, Math.min(4, botY));
        }
        r.style.transform = `rotate(${currentTempDir * 90}deg)`;
        r.style.left = (botX * 95 + 5) + "px";
        r.style.top = (botY * 95 + 5) + "px";
        if(trees.some(t => t.x === botX && t.y === botY)) { alert("Baum!"); renderCurrentTask(); return; }
        i++; setTimeout(step, 600);
      } else {
        if(botX === 4 && botY === 0) { punkte += 20; currentTask = 4; renderCurrentTask(); }
        else { versuche++; if(versuche >= 2) { currentTask = 4; renderCurrentTask(); } else { alert("Versuch es nochmal!"); document.getElementById('btnA3').disabled = false; } }
      }
    }
    step();
  }

  function translateNow() {
    let v = document.getElementById('t-name').value;
    document.getElementById('b-res').innerText = v.split('').map(c=>c.charCodeAt(0).toString(2).padStart(8,'0')).join(' ');
    document.getElementById('b-res').classList.remove('hidden'); document.getElementById('count-area').classList.remove('hidden');
  }

  function checkA4() { punkte+=20; currentTask=5; renderCurrentTask(); }

  function loadPixels() {
    const c = document.getElementById('pixel-canvas');
    for(let i=0; i<15*13; i++){
      let p = document.createElement('div'); p.className='pix'; p.dataset.painted="false"; p.innerText=Math.floor(Math.random()*9)+1;
      p.onmouseover = p.ontouchmove = (e) => {
        let t = e.touches ? e.touches[0] : e;
        let target = document.elementFromPoint(t.clientX, t.clientY);
        if(target && target.className==='pix' && target.dataset.painted==="false"){
          target.dataset.painted="true"; pixelsPainted++;
          target.style.background="url('fruhling.png')"; target.style.backgroundSize="675px 585px";
          let idx = Array.from(c.children).indexOf(target);
          target.style.backgroundPosition = `-${(idx%15)*45}px -${Math.floor(idx/15)*45}px`;
          target.innerText=""; target.style.border="none";
        }
      };
      c.appendChild(p);
    }
  }

  function checkA5() {
    savedAntwortA5 = document.getElementById('px-guess').value;
    let score = Math.floor(((pixelsPainted / (15*13)) * 15) * 2) / 2;
    punkte += score; if(savedAntwortA5.trim() !== "") punkte += 5;
    currentTask = 6; renderCurrentTask();
  }

  function initPaint() {
    const cvs = document.getElementById('paint-canvas'); const ctx = cvs.getContext('2d');
    let d = false; const draw = (e) => {
      if(!d) return; ctx.lineWidth = currentBrushSize; ctx.lineCap='round'; ctx.strokeStyle = currentColor;
      const rect = cvs.getBoundingClientRect();
      const x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
      const y = (e.touches ? e.touches[0].clientY : e.clientY) - rect.top;
      ctx.lineTo(x, y); ctx.stroke(); ctx.beginPath(); ctx.moveTo(x, y);
    };
    cvs.onmousedown = cvs.ontouchstart = (e) => { d = true; draw(e); };
    cvs.onmouseup = cvs.ontouchend = () => { d = false; ctx.beginPath(); };
    cvs.onmousemove = cvs.ontouchmove = draw;
  }
  
  function finishA6() { punkte+=10; currentTask=7; subIndex=0; renderCurrentTask(); }

  function checkA8() {
    let items = document.querySelectorAll('.click-item');
    let badItems = Array.from(items).filter(i => i.dataset.bad === "true");
    let selectedBad = Array.from(items).filter(i => i.classList.contains('error-bg') && i.dataset.bad === "true");
    punkte += Math.floor((selectedBad.length / badItems.length) * 10);
    finishGame();
  }

  function finishGame() {
    document.getElementById('avatar').classList.add('hidden');
    document.getElementById('header').classList.add('hidden');
    document.getElementById('game-area').innerHTML = `
      <img src="menino.png" width="350">
      <div class="finish-text" style="font-size:80px; font-weight:bold; color:var(--purple);">Fertig!</div>
      <p style="font-size:2rem; font-weight:bold;">Punkte: ${punkte}</p>`;

    google.script.run.salvarDados({
      id: studentID, 
      score: punkte, 
      antwortA5: savedAntwortA5, 
      statusDesenho: "Abgeschlossen"
    });
  }
</script>
</body>
</html>
